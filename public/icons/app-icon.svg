<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Neon cyan glow filter -->
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="14" result="blur2"/>
      <feGaussianBlur stdDeviation="28" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000"/>

  <!-- Subtle dark radial centre glow -->
  <radialGradient id="bg-glow" cx="50%" cy="55%" r="50%">
    <stop offset="0%" stop-color="#001a2e" stop-opacity="1"/>
    <stop offset="100%" stop-color="#000" stop-opacity="1"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#bg-glow)"/>

  <!-- Speed lines (left side, 3 horizontal streaks) -->
  <g filter="url(#glow-soft)" opacity="0.85">
    <line x1="32"  y1="268" x2="105" y2="268" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18"  y1="285" x2="95"  y2="285" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="40"  y1="252" x2="98"  y2="252" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- ── Car silhouette — side profile facing LEFT ── -->
  <!-- Drawn as a single continuous outline path -->

  <!-- Outer glow pass (wide, very soft) -->
  <path
    d="
      M 148 350
      L 104 350
      Q  88 350  88 335
      L  88 310
      Q  88 295  100 288
      L 128 275
      L 148 248
      Q 155 232  168 228
      L 220 218
      Q 232 198  248 185
      L 295 172
      Q 330 165  360 168
      L 392 172
      Q 412 176  420 190
      L 438 220
      L 454 225
      Q 468 230  472 245
      L 476 268
      Q 476 285  462 290
      L 440 295
      Q 436 315  432 330
      L 370 330
      Q 366 310  355 302
      Q 338 292  318 302
      Q 304 310  302 330
      L 218 330
      Q 214 310  203 302
      Q 186 292  166 302
      Q 152 310  150 330
      Z
    "
    fill="none"
    stroke="#22d3ee"
    stroke-width="18"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.12"
  />

  <!-- Mid glow pass -->
  <path
    d="
      M 148 350
      L 104 350
      Q  88 350  88 335
      L  88 310
      Q  88 295  100 288
      L 128 275
      L 148 248
      Q 155 232  168 228
      L 220 218
      Q 232 198  248 185
      L 295 172
      Q 330 165  360 168
      L 392 172
      Q 412 176  420 190
      L 438 220
      L 454 225
      Q 468 230  472 245
      L 476 268
      Q 476 285  462 290
      L 440 295
      Q 436 315  432 330
      L 370 330
      Q 366 310  355 302
      Q 338 292  318 302
      Q 304 310  302 330
      L 218 330
      Q 214 310  203 302
      Q 186 292  166 302
      Q 152 310  150 330
      Z
    "
    fill="none"
    stroke="#22d3ee"
    stroke-width="8"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- Sharp main outline -->
  <path
    d="
      M 148 350
      L 104 350
      Q  88 350  88 335
      L  88 310
      Q  88 295  100 288
      L 128 275
      L 148 248
      Q 155 232  168 228
      L 220 218
      Q 232 198  248 185
      L 295 172
      Q 330 165  360 168
      L 392 172
      Q 412 176  420 190
      L 438 220
      L 454 225
      Q 468 230  472 245
      L 476 268
      Q 476 285  462 290
      L 440 295
      Q 436 315  432 330
      L 370 330
      Q 366 310  355 302
      Q 338 292  318 302
      Q 304 310  302 330
      L 218 330
      Q 214 310  203 302
      Q 186 292  166 302
      Q 152 310  150 330
      Z
    "
    fill="none"
    stroke="#22d3ee"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
    opacity="1"
  />

  <!-- Windshield / roof line detail -->
  <path d="M 220 218 L 248 185 L 295 172 Q 330 165 360 168 L 392 172"
    fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.7" stroke-linecap="round"/>

  <!-- Roof arc inner line -->
  <path d="M 248 185 Q 300 178 355 182"
    fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.45" stroke-linecap="round"/>

  <!-- Front wheel (left wheel) -->
  <!-- Outer glow -->
  <circle cx="184" cy="350" r="42" fill="none" stroke="#22d3ee" stroke-width="12" opacity="0.15"/>
  <circle cx="184" cy="350" r="42" fill="none" stroke="#22d3ee" stroke-width="5"  opacity="0.4"/>
  <circle cx="184" cy="350" r="42" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="1"/>
  <!-- Hub -->
  <circle cx="184" cy="350" r="10" fill="none" stroke="#22d3ee" stroke-width="2"  opacity="0.8"/>
  <circle cx="184" cy="350" r="3"  fill="#22d3ee" opacity="0.9"/>

  <!-- Rear wheel (right wheel) -->
  <circle cx="340" cy="350" r="42" fill="none" stroke="#22d3ee" stroke-width="12" opacity="0.15"/>
  <circle cx="340" cy="350" r="42" fill="none" stroke="#22d3ee" stroke-width="5"  opacity="0.4"/>
  <circle cx="340" cy="350" r="42" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="1"/>
  <circle cx="340" cy="350" r="10" fill="none" stroke="#22d3ee" stroke-width="2"  opacity="0.8"/>
  <circle cx="340" cy="350" r="3"  fill="#22d3ee" opacity="0.9"/>

  <!-- Ground line / chassis bottom -->
  <line x1="88" y1="350" x2="148" y2="350" stroke="#22d3ee" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
  <line x1="88" y1="350" x2="148" y2="350" stroke="#22d3ee" stroke-width="8" opacity="0.25" stroke-linecap="round"/>
  <line x1="226" y1="350" x2="298" y2="350" stroke="#22d3ee" stroke-width="3" opacity="0.9" stroke-linecap="round"/>
  <line x1="382" y1="350" x2="478" y2="350" stroke="#22d3ee" stroke-width="3" opacity="0.9" stroke-linecap="round"/>

  <!-- Headlight (front, left) -->
  <ellipse cx="100" cy="308" rx="8" ry="5" fill="#22d3ee" opacity="0.9"/>
  <ellipse cx="100" cy="308" rx="14" ry="9" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>

  <!-- Tail light (rear, right) -->
  <ellipse cx="466" cy="255" rx="6" ry="10" fill="#22d3ee" opacity="0.75"/>
  <ellipse cx="466" cy="255" rx="10" ry="15" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.4"/>
</svg>
